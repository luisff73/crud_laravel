name: laravel_app
services:
  php:
    image: php:8.4-fpm
    build: ./php
    volumes:
      - ./src:/var/www/html
      - ./php/conf.d/99-xdebug.ini:/usr/local/etc/php/conf.d/99-xdebug.ini
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_USER=alumno
      - MYSQL_PASSWORD=alumno
      - MYSQL_DB=test
    command: sh -c "chown -R www-data:www-data /var/www/html/storage /var/www/html/bootstrap/cache && chmod -R 775 /var/www/html/storage /var/www/html/bootstrap/cache && docker-php-entrypoint php-fpm"
  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8081:80" # Acceder a phpMyAdmin en http://localhost:8081
    environment:
      PMA_HOST: mysql # El nombre del servicio de MySQL en docker-compose
      MYSQL_ROOT_PASSWORD: administrador # La contraseña de root de tu MySQL
    depends_on:
      - mysql

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: administrador
      MYSQL_USER: root
      MYSQL_PASSWORD: administrador
      MYSQL_DATABASE: test
    volumes:
      - ./mysql/data:/var/lib/mysql # Almacena los datos de MySQL en la carpeta local './mysql/data'
      - ./mysql/initdb:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    networks:
      - default

networks:
  default:
    driver: bridge
